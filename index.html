<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input class="inp1" placeholder="Введіть число" type="text" />
    <input class="inp2" placeholder="Введіть число" type="text" />
    <button class="plus">+</button>
    <button class="minus">-</button>
    <button class="multiplying">*</button>
    <button class="dividying">/</button>
    <div>
      <p>Камінь - ножиці - папір</p>
      <button class="stone">stone</button>
      <button class="scissors">scissors</button>
      <button class="paper">papper</button>
      <p class="result_game"></p>
      <p class="computer_answer"></p>

      <div>
        <p>Рахунок:</p>
        <p>Комп’ютер - <span class="computer">0</span></p>
        <p>Ви - <span class="user">0</span></p>
      </div>
      <div>
        <input class="minutes_inp" placeholder="Введіть число" type="text" />
        <p class="days_p"></p>
      </div>
    </div>
    <p class="p"></p>
    <button class="button-1">Які вчені народилися в 19 ст.</button>
    <button class="button-2">Відсортувати вчених за алфавітом</button>
    <button class="button-3">
      Відсортувати вчених за кількістю прожитих років
    </button>
    <button class="button-4">Знайти вченого, який народився найпізніше</button>
    <button class="button-5">
      Знайти вчених, в яких співпадають перші літери імені і прізвища
    </button>
    <button class="button-6">Знайти рік народження Albert Einshtein</button>
    <button class="button-7">
      Знайти вчених, прізвища яких починаються на на літеру “С”
    </button>
    <button class="button-8">
      Видалити всіх вчених, ім’я яких починається на “А”
    </button>
    <button class="button-9">
      Знайти вченого, який прожив найдовше і вченого, який прожив найменше
    </button>
    <script src="./index.js"></script>
  </body>
</html>
